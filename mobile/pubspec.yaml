name: terra
description: "TERRA — territory conquest running app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Auth + Backend
  supabase_flutter: ^2.5.9
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # GPS
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Local DB / cache
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Animations
  confetti: ^0.7.0
  lottie: ^3.1.3

  # Fonts & UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.4.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.2
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/
